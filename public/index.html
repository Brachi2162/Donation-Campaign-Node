<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צי קונג 2 - מסע של נתינה</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --space-dark: #0f0c29;
            --nebula-purple: #302b63;
            --star-gold: #fff1a8;
            --soft-yellow: #fce38a;
            --magic-blue: #24243e;
            --glass-white: rgba(255, 255, 255, 0.08);
            --text-glow: 0 0 10px rgba(252, 227, 138, 0.5);
        }

        body { 
            font-family: 'Heebo', sans-serif; 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            margin: 0; 
            padding: 0; 
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* רקע כוכבים מנצנצים */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        header {
            padding: 80px 20px 40px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        header h1 { 
            font-weight: 900;
            font-size: 4rem; 
            margin: 0; 
            background: linear-gradient(to bottom, #fff, var(--soft-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(var(--text-glow));
        }

        header p {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #a1c4fd;
            font-weight: 300;
        }

        .container { 
            max-width: 1000px; 
            margin: auto; 
            padding: 0 20px 100px; 
            position: relative; 
            z-index: 1;
        }
        
        /* Glassmorphism Soft Cards */
        .magic-card {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        /* Progress Bar - Soft & Glowing */
        .progress-wrapper {
            background: rgba(255,255,255,0.1);
            height: 50px;
            border-radius: 25px;
            padding: 6px;
            border: 1px solid rgba(252, 227, 138, 0.3);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        #bar-fill { 
            background: linear-gradient(90deg, #fce38a, #f38181); 
            height: 100%; 
            border-radius: 20px;
            width: 0%; 
            transition: width 2.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #24243e; 
            font-weight: 800;
            box-shadow: 0 0 20px rgba(252, 227, 138, 0.6);
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .stat-box {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-box label { display: block; font-size: 0.9rem; color: #a1c4fd; margin-bottom: 5px; }
        .stat-box span { font-size: 2rem; font-weight: 700; color: var(--soft-yellow); }

        /* Inputs */
        .donate-form {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
        }

        select, input { 
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 18px; 
            border-radius: 20px; 
            color: white;
            font-size: 1.1rem; 
            font-family: 'Heebo';
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--soft-yellow); }

        .btn-magic { 
            background: linear-gradient(135deg, var(--soft-yellow), #f38181); 
            color: #24243e; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 1.1rem;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(243, 129, 129, 0.3);
        }

        .btn-magic:hover { 
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 30px rgba(252, 227, 138, 0.5);
        }

        /* Lists */
        .lists { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        h3 { color: var(--soft-yellow); font-size: 1.5rem; margin-top: 0; text-align: right; }
        
        ul { list-style: none; padding: 0; }
        li { 
            padding: 18px 25px; 
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-bottom: 12px;
            display: flex; 
            justify-content: space-between;
            align-items: center;
        }
        li:nth-child(1) { border: 1px solid var(--soft-yellow); background: rgba(252, 227, 138, 0.1); }
        li span { font-weight: 700; color: var(--soft-yellow); font-size: 1.2rem; }

        .admin-footer {
            margin-top: 80px;
            text-align: center;
            opacity: 0.5;
            transition: 0.5s;
        }
        .admin-footer:hover { opacity: 1; }

        #win-msg { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 150px; display: none; z-index: 1000;
            filter: drop-shadow(0 0 30px var(--soft-yellow));
        }

        @media (max-width: 800px) {
            .donate-form, .lists, .stats-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>צי קונג 2</h1>
    <p>מפיצים אור בגלקסיה של חסד</p>
</header>

<div class="container">
    <div id="win-msg">✨</div>
    
    <div class="magic-card">
        <div class="progress-wrapper">
            <div id="bar-fill">0%</div>
        </div>
        <div class="stats-grid">
            <div class="stat-box">
                <label>כוכבים שנאספו</label>
                <span id="raised">0</span> ₪
            </div>
            <div class="stat-box">
                <label>היעד לקראת הירח</label>
                <span id="target">0</span> ₪
            </div>
        </div>
    </div>

    <div class="magic-card">
        <h3>הצטרפו למסע</h3>
        <div class="donate-form">
            <select id="fundraiserSelect">
                <option value="">בחרו שליח חסד...</option>
            </select>
            <input type="number" id="donateAmount" value="1000">
            <button class="btn-magic" onclick="donate()">שלח תרומה</button>
        </div>
    </div>

    <div class="lists">
        <div class="magic-card">
            <h3>שגרירי האור</h3>
            <ul id="fundraisers-list"></ul>
        </div>
        <div class="magic-card">
            <h3>קהילות בדרכן</h3>
            <ul id="groups-list"></ul>
        </div>
    </div>

    <div class="admin-footer">
        <div class="magic-card" style="padding: 20px;">
            <p style="margin: 0 0 15px; color: #f38181; font-weight: bold;">שינוי מסלול (מנהל)</p>
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <input type="number" id="newTarget" placeholder="יעד חדש" style="padding: 10px;">
                <input type="password" id="adminPass" placeholder="קוד גישה" style="padding: 10px;">
                <button onclick="updateTarget()" class="btn-magic" style="padding: 0 20px;">עדכן</button>
            </div>
        </div>
    </div>
</div>

<script>
    const socket = io();

    socket.on('campaignUpdate', (data) => {
        updateUI(data.campaign);
        refreshStats();
    });

    async function init() {
        const res = await fetch('/api/campaign/info');
        const data = await res.json();
        updateUI(data);
        refreshStats();
    }

    function updateUI(data) {
        if (!data) return;
        const raised = Number(data.raisedAmount) || 0;
        const target = Number(data.targetAmount) || 1;
        const pct = Math.min((raised / target) * 100, 100).toFixed(1);

        const bar = document.getElementById('bar-fill');
        bar.style.width = pct + '%';
        bar.innerText = pct + '%';
        
        document.getElementById('target').innerText = target.toLocaleString();
        document.getElementById('raised').innerText = raised.toLocaleString();

        if (data.isCompleted) {
            document.getElementById('win-msg').style.display = 'block';
            confetti({ 
                particleCount: 300, 
                spread: 150, 
                origin: { y: 0.6 },
                colors: ['#fce38a', '#f38181', '#a1c4fd'] 
            });
        }
    }

    async function refreshStats() {
        const fRes = await fetch('/api/fundraisers');
        const fundraisers = await fRes.json();
        document.getElementById('fundraisers-list').innerHTML = fundraisers
            .sort((a,b) => b.amountRaised - a.amountRaised)
            .map(f => `<li>${f.name} <span>${(f.amountRaised || 0).toLocaleString()} ₪</span></li>`).join('');

        const currentVal = document.getElementById('fundraiserSelect').value;
        document.getElementById('fundraiserSelect').innerHTML = 
            '<option value="">תרומה כללית לגלקסיה</option>' + 
            fundraisers.map(f => `<option value="${f._id}">${f.name}</option>`).join('');
        document.getElementById('fundraiserSelect').value = currentVal;

        const gRes = await fetch('/api/groups');
        const groups = await gRes.json();
        document.getElementById('groups-list').innerHTML = groups
            .sort((a,b) => b.totalRaised - a.totalRaised)
            .map(g => `<li>${g.name} <span>${(g.totalRaised || 0).toLocaleString()} ₪</span></li>`).join('');
    }

    async function donate() {
        const amountInput = document.getElementById('donateAmount');
        const amount = amountInput.value;
        const fundraiserId = document.getElementById('fundraiserSelect').value;

        if (!amount || amount <= 0) return;

        const res = await fetch('/api/donate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: Number(amount), fundraiserId })
        });

        if (res.ok) { amountInput.value = "1000"; }
    }

    async function updateTarget() {
        const newTarget = document.getElementById('newTarget').value;
        const password = document.getElementById('adminPass').value;
        const res = await fetch('/api/campaign/target', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'password': password },
            body: JSON.stringify({ newTarget: Number(newTarget) })
        });
        if (res.ok) {
            alert("היעד עודכן במערכת הכוכבים");
            document.getElementById('newTarget').value = '';
            document.getElementById('adminPass').value = '';
        }
    }

    init();
</script>
</body>
</html>
